<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiGas AI - Selección de Rol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { navy: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.5s ease; }
        .bg-industrial {
            background-color: #0f172a; /* navy-900 */
        }
        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            transition: all 0.5s ease;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .role-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="bg-industrial min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Glows -->
    <div id="glow-1" class="bg-glow top-[-20%] left-[-10%] bg-slate-500"></div>
    <div id="glow-2" class="bg-glow bottom-[-20%] right-[-10%] bg-slate-500"></div>

    <!-- Botón Volver -->
    <a href="../../proyectos.html" class="absolute top-6 left-6 text-slate-400 hover:text-white transition-colors flex items-center gap-2 font-medium z-10">
        <i class="fa-solid fa-arrow-left"></i> Volver al Portafolio
    </a>

    <div class="w-full max-w-4xl px-6 relative z-10">
        
        <!-- Logo & Titulo -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-800 shadow-lg mb-4" id="main-icon-bg">
                <i class="fa-solid fa-fire-flame-curved text-3xl text-white" id="main-icon"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Selecciona un Rol</h1>
            <p class="text-slate-400">Entorno de Demostración</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Tarjeta Admin -->
            <button onclick="window.location.href='dashboard.html'" onmouseenter="setTheme('admin')" onmouseleave="resetTheme()" class="role-card glass-panel rounded-3xl p-8 text-left group relative overflow-hidden cursor-pointer w-full">
                <div class="absolute inset-0 bg-gradient-to-br from-orange-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="relative z-10">
                    <div class="w-14 h-14 rounded-full bg-slate-800 group-hover:bg-orange-500 flex items-center justify-center mb-6 transition-colors duration-300">
                        <i class="fa-solid fa-user-shield text-xl text-slate-400 group-hover:text-white transition-colors"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-orange-400 transition-colors">Administrador</h2>
                    <p class="text-slate-400 text-sm mb-6">Accede al panel de control principal. Gestiona clientes, inspectores, despachos y cotizaciones con visibilidad completa de costos.</p>
                    <div class="flex items-center text-sm font-bold text-slate-500 group-hover:text-orange-400 transition-colors">
                        Ingresar como Admin <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-2 transition-transform"></i>
                    </div>
                </div>
            </button>

            <!-- Tarjeta Cliente -->
            <button onclick="window.location.href='portal-dashboard.html'" onmouseenter="setTheme('client')" onmouseleave="resetTheme()" class="role-card glass-panel rounded-3xl p-8 text-left group relative overflow-hidden cursor-pointer w-full">
                <div class="absolute inset-0 bg-gradient-to-br from-sky-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                <div class="relative z-10">
                    <div class="w-14 h-14 rounded-full bg-slate-800 group-hover:bg-sky-500 flex items-center justify-center mb-6 transition-colors duration-300">
                        <i class="fa-solid fa-building-user text-xl text-slate-400 group-hover:text-white transition-colors"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-sky-400 transition-colors">Portal Cliente</h2>
                    <p class="text-slate-400 text-sm mb-6">Accede a la vista del cliente final. Revisa el estado del Sello Verde, próximas visitas y descarga documentos y cotizaciones.</p>
                    <div class="flex items-center text-sm font-bold text-slate-500 group-hover:text-sky-400 transition-colors">
                        Ingresar como Cliente <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-2 transition-transform"></i>
                    </div>
                </div>
            </button>

        </div>
    </div>

    <script>
        function setTheme(role) {
            const glow1 = document.getElementById('glow-1');
            const glow2 = document.getElementById('glow-2');
            const mainIconBg = document.getElementById('main-icon-bg');
            const mainIcon = document.getElementById('main-icon');

            // Reset classes
            glow1.className = "bg-glow top-[-20%] left-[-10%]";
            glow2.className = "bg-glow bottom-[-20%] right-[-10%]";
            mainIconBg.className = "inline-flex items-center justify-center w-16 h-16 rounded-2xl shadow-lg mb-4 transition-all duration-300";
            
            if (role === 'admin') {
                glow1.classList.add('bg-orange-600');
                glow2.classList.add('bg-orange-500');
                mainIconBg.classList.add('bg-gradient-to-br', 'from-orange-400', 'to-orange-600', 'shadow-orange-500/30');
            } else if (role === 'client') {
                glow1.classList.add('bg-sky-600');
                glow2.classList.add('bg-sky-500');
                mainIconBg.classList.add('bg-gradient-to-br', 'from-sky-400', 'to-sky-600', 'shadow-sky-500/30');
            }
        }

        function resetTheme() {
            const glow1 = document.getElementById('glow-1');
            const glow2 = document.getElementById('glow-2');
            const mainIconBg = document.getElementById('main-icon-bg');

            glow1.className = "bg-glow top-[-20%] left-[-10%] bg-slate-500";
            glow2.className = "bg-glow bottom-[-20%] right-[-10%] bg-slate-500";
            mainIconBg.className = "inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-800 shadow-lg mb-4 transition-all duration-300";
        }
    </script>
</body>
</html>
