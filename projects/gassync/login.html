<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiGas AI - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-industrial {
            background-image: linear-gradient(to bottom right, #0f172a, #1e3a8a, #0f172a);
            background-size: cover;
            background-position: center;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-industrial min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Decoración de Fondo -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-orange-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>

    <!-- Botón Volver -->
    <a href="../../proyectos.html" class="absolute top-6 left-6 text-slate-300 hover:text-white transition-colors flex items-center gap-2 font-medium z-10">
        <i class="fa-solid fa-arrow-left"></i> Volver al Portafolio
    </a>

    <div class="w-full max-w-md px-6 relative z-10">
        <div class="glass-panel rounded-3xl p-10 shadow-2xl">
            
            <!-- Logo & Titulo -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-400 to-orange-600 shadow-lg shadow-orange-500/30 mb-4">
                    <i class="fa-solid fa-fire-flame-curved text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">CertiGas AI</h1>
                <p class="text-slate-400 mt-2">Plataforma de Gestión B2B</p>
            </div>

            <!-- Formulario (Simulado) -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-500"></i>
                        </div>
                        <input type="email" value="admin@gast.cl" class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-xl leading-5 bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors sm:text-sm" placeholder="usuario@empresa.cl" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-500"></i>
                        </div>
                        <input type="password" value="123456" class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-xl leading-5 bg-slate-800/50 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors sm:text-sm" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-orange-500 focus:ring-orange-500 border-slate-700 bg-slate-800 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-300">
                            Recordarme
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-orange-400 hover:text-orange-300 transition-colors">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </div>

                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-orange-500 transform transition hover:-translate-y-0.5">
                    Ingresar al Panel
                </button>
                
            </form>

            <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
                <p class="text-xs text-slate-500">Demostración B2B • Módulo de Gestión de Clientes</p>
            </div>
        </div>
    </div>
</body>
</html>
