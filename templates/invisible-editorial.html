<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Architecture - Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');
        body {
            background-color: #fcfcfc;
            color: #1a1a1a;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            margin: 0;
        }
        .sans { font-family: 'Inter', sans-serif; }
        
        /* Typography deformation on scroll */
        .title-deform {
            display: inline-block;
            transition: transform 0.1s ease-out;
            transform-origin: bottom center;
        }

        /* Image Parallax */
        .img-container {
            overflow: hidden;
            height: 80vh;
        }
        .img-parallax {
            width: 100%;
            height: 120%;
            object-fit: cover;
            transform: translateY(-10%);
        }

        /* Invisible UI */
        .invisible-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 2rem;
            display: flex; justify-content: space-between;
            mix-blend-difference; color: white;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        /* Reveal UI on hover top area */
        .nav-trigger {
            position: fixed;
            top: 0; width: 100%; height: 100px;
            z-index: 40;
        }
        .nav-trigger:hover + .invisible-nav, .invisible-nav:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="nav-trigger"></div>
    <nav class="invisible-nav sans text-sm uppercase tracking-widest">
        <span>Chapter I</span>
        <span class="cursor-pointer" onclick="alert('Menu Demo')">Index</span>
    </nav>

    <main class="min-h-[200vh] py-32 px-4 md:px-20 lg:px-40 flex flex-col items-center">
        
        <p class="sans text-xs uppercase tracking-widest mb-10 text-gray-400">Issue 04 — The Silence</p>
        
        <h1 class="text-7xl md:text-9xl text-center leading-tight mb-20 max-w-5xl" id="main-title">
            <span class="title-deform">Design</span> 
            <span class="title-deform italic text-gray-400">without</span> 
            <span class="title-deform">interface.</span>
        </h1>

        <div class="w-full img-container mb-32">
            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=1200" alt="Architecture" class="img-parallax" id="hero-img">
        </div>

        <div class="max-w-2xl text-xl md:text-3xl leading-relaxed">
            <p class="mb-10">The best interfaces are the ones you don't notice. In 2026, we stopped designing buttons and started designing spaces.</p>
            <p class="text-gray-400 italic">Typography became architecture. Gestures became the navigation. The content became the UI.</p>
        </div>

    </main>

    <script>
        const titleWords = document.querySelectorAll('.title-deform');
        const heroImg = document.getElementById('hero-img');

        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            
            // Deform text
            titleWords.forEach((word, index) => {
                const skew = Math.min(scrolled * 0.05 * (index % 2 === 0 ? 1 : -1), 20);
                const y = scrolled * 0.1;
                word.style.transform = `skewX(${skew}deg) translateY(${y}px)`;
            });

            // Parallax Image
            const imgY = -10 + (scrolled * 0.05);
            heroImg.style.transform = `translateY(${imgY}%)`;
        });
    </script>
</body>
</html>
